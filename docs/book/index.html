<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Qora Docs</title>
<script>
  (function () {
    var lang = null;
    try { lang = localStorage.getItem('qora-lang'); } catch (e) {}
    if (lang !== 'en' && lang !== 'ko' && lang !== 'ja') {
      lang = 'ko';  // these legacy URLs circulated as Korean content
      var prefs = navigator.languages || [navigator.language || ''];
      for (var i = 0; i < prefs.length; i++) {
        var p = String(prefs[i]).toLowerCase();
        if (p.indexOf('ko') === 0) { lang = 'ko'; break; }
        if (p.indexOf('ja') === 0) { lang = 'ja'; break; }
        if (p.indexOf('en') === 0) { lang = 'en'; break; }
      }
    }
    location.replace('../' + lang + '/book/index.html');
  })();
</script>
<meta http-equiv="refresh" content="1; url=../ko/book/index.html">
</head>
<body><p><a href="../ko/book/index.html">이동…</a></p></body>
</html>
