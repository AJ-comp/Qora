<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qora Documentation</title>
<script>
  // language routing: forced choice (localStorage) > browser language > English fallback.
  (function () {
    var forced = null;
    try { forced = localStorage.getItem('qora-lang'); } catch (e) {}
    var lang = forced;
    if (lang !== 'en' && lang !== 'ko' && lang !== 'ja') {
      lang = 'en';
      var prefs = navigator.languages || [navigator.language || ''];
      for (var i = 0; i < prefs.length; i++) {
        var p = String(prefs[i]).toLowerCase();
        if (p.indexOf('ko') === 0) { lang = 'ko'; break; }
        if (p.indexOf('ja') === 0) { lang = 'ja'; break; }
        if (p.indexOf('en') === 0) { lang = 'en'; break; }
      }
    }
    location.replace(lang + '/' + location.search + location.hash);
  })();
</script>
</head>
<body>
<noscript>
  <p><a href="en/">English</a> · <a href="ko/">한국어</a> · <a href="ja/">日本語</a></p>
</noscript>
</body>
</html>
